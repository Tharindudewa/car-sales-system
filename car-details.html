<!DOCTYPE html>

</head>

<body>

<header class="navbar">
  <div class="logo">AUTO<span>MART</span></div>
  <nav>

    <a href="about.html">About</a>

<div class="car-details-container" style="max-width: 1200px; margin: 40px auto; padding: 40px; background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; display: flex; gap: 60px; align-items: center;">
  
<div class="car-details-img" style="flex: 1;">
